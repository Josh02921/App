<script>
// Use hardcoded values to avoid template evaluation issues - NO TEMPLATE VARIABLES
// These will be set dynamically via JavaScript if needed
const NAVIGATION_STATE = {
  scriptUrl: 'https://script.google.com/macros/s/AKfycbyqf60NKXYCOhimJq7MbutuFJDqOqb5aJVFJXGWSvmfWNd8osWpc0yJ-7ro78VpLK7ljw/exec',
  currentPage: 'dashboard' // Will be set from URL or data attribute
};

// Get current page from URL or data attribute
(function() {
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const pageFromUrl = urlParams.get('page');
    if (pageFromUrl) {
      NAVIGATION_STATE.currentPage = pageFromUrl;
    } else {
      // Try to get from sidebar data attribute
      const sidebar = document.querySelector('.sidebar');
      if (sidebar && sidebar.dataset.currentPage) {
        NAVIGATION_STATE.currentPage = sidebar.dataset.currentPage;
      }
    }
  } catch(e) {
    // Use default
  }
})();

// Try to get scriptUrl from server if available
if (typeof google !== 'undefined' && google.script && google.script.run) {
  google.script.run.withSuccessHandler(function(url) {
    if (url) {
      NAVIGATION_STATE.scriptUrl = url;
    }
  }).getScriptUrl();
}

// Update user info display
function updateSidebarUserInfo() {
  // Try to get username from template variable first
  const templateUsername = '<?= user && user.username ? user.username : "" ?>';
  const templateRole = '<?= user && user.role ? user.role : "" ?>';
  
  // Fallback to localStorage
  const storedUsername = localStorage.getItem('username') || templateUsername || 'Admin';
  const storedRole = templateRole || 'Administrator';
  
  // Update sidebar username
  const sidebarUsername = document.getElementById('sidebar-username');
  if (sidebarUsername) {
    sidebarUsername.textContent = storedUsername;
  }
  
  // Update sidebar role
  const sidebarRole = document.getElementById('sidebar-userrole');
  if (sidebarRole) {
    sidebarRole.textContent = storedRole;
  }
  
  // If still not set, try to get from session
  if (storedUsername === 'Admin' || !storedUsername) {
    const sessionToken = sessionManager.getToken();
    if (sessionToken) {
      callApi('validateSessionTokenApi', { sessionToken: sessionToken }, function(result) {
        if (result && result.success && result.user) {
          const username = result.user.username || 'Admin';
          const role = result.user.role || 'Administrator';
          
          if (sidebarUsername) sidebarUsername.textContent = username;
          if (sidebarRole) sidebarRole.textContent = role;
          
          // Store in localStorage for next time
          localStorage.setItem('username', username);
        }
      }, function(error) {
        console.error('Error validating session:', error);
      });
    }
  }
}

// Enhanced sidebar functionality
(function() {
  // Run immediately and on DOMContentLoaded
  function initSidebar() {
    highlightCurrentPage();
    setupSidebarInteractions();
    setupSidebarAnimations();
    updateSidebarUserInfo(); // Update user info
  }
  
  // Run immediately if DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initSidebar);
  } else {
    initSidebar();
  }
  
  // Also run after a short delay to catch dynamic content
  setTimeout(initSidebar, 100);
})();

function highlightCurrentPage() {
  // Get current page from URL or NAVIGATION_STATE
  let activePage = 'dashboard';
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const pageFromUrl = urlParams.get('page');
    if (pageFromUrl) {
      activePage = pageFromUrl.toLowerCase();
    } else {
      // Try to get from sidebar data attribute
      const sidebar = document.querySelector('.sidebar');
      if (sidebar && sidebar.dataset.currentPage) {
        activePage = sidebar.dataset.currentPage.toLowerCase();
      } else if (typeof NAVIGATION_STATE !== 'undefined' && NAVIGATION_STATE && NAVIGATION_STATE.currentPage) {
        activePage = NAVIGATION_STATE.currentPage.toLowerCase();
      }
    }
  } catch(e) {
    console.error('Error detecting current page:', e);
  }
  
  console.log('Highlighting page:', activePage);
  
  // Update all sidebar items
  document.querySelectorAll('.sidebar-item').forEach(item => {
    const itemPage = (item.dataset.page || '').toLowerCase();
    if (itemPage === activePage) {
      item.classList.add('active');
      console.log('Activated sidebar item:', itemPage);
    } else {
      item.classList.remove('active');
    }
  });
  
  // Ensure sidebar has proper styling
  const sidebar = document.querySelector('.sidebar');
  if (sidebar) {
    sidebar.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
    sidebar.style.color = 'white';
    // Ensure all text is visible
    const allText = sidebar.querySelectorAll('span, h3, div, .sidebar-subtitle');
    allText.forEach(el => {
      if (el && !el.closest('.sidebar-item.active')) {
        el.style.color = 'rgba(255, 255, 255, 0.9)';
      }
    });
  }
}

function setupSidebarInteractions() {
  // Ensure sidebar is visible
  const sidebar = document.querySelector('.sidebar');
  if (sidebar) {
    sidebar.style.display = 'flex';
    sidebar.style.visibility = 'visible';
    sidebar.style.opacity = '1';
  }
  
  function ensureExecUrl(url) {
    if (!url) return null;
    let cleanUrl = url.split('?')[0].split('#')[0];
    cleanUrl = cleanUrl.replace(/\/$/, '');
    if (!cleanUrl.endsWith('/exec')) {
      if (cleanUrl.indexOf('script.google.com') !== -1) {
        cleanUrl = cleanUrl + '/exec';
      } else {
        cleanUrl = cleanUrl.replace(/\/(home|dev)$/, '/exec');
        if (!cleanUrl.endsWith('/exec')) {
          cleanUrl = cleanUrl + '/exec';
        }
      }
    }
    return cleanUrl;
  }
  
  document.querySelectorAll('.sidebar-item').forEach(item => {
    item.addEventListener('click', function(e) {
      // Add ripple effect
      const ripple = document.createElement('div');
      ripple.style.cssText = `
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.6);
        transform: scale(0);
        animation: ripple 0.6s linear;
        pointer-events: none;
      `;
      
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      
      this.appendChild(ripple);
      
      setTimeout(() => {
        ripple.remove();
      }, 600);

          const targetPage = this.dataset.page;
          if (targetPage) {
            setTimeout(() => {
              // CRITICAL: Always use navigateToPage from CommonJS which handles token properly
              // This ensures token is always in URL
              if (typeof navigateToPage === 'function') {
                console.log('Sidebar: Using navigateToPage for:', targetPage);
                navigateToPage(targetPage);
              } else if (window.navigateToPage) {
                console.log('Sidebar: Using window.navigateToPage for:', targetPage);
                window.navigateToPage(targetPage);
              } else {
                // Fallback: Get token from URL or storage
                const urlParams = new URLSearchParams(window.location.search);
                let currentToken = urlParams.get('sessionToken') || '';
                
                // If no token in URL, try to get from storage
                if (!currentToken || currentToken.trim() === '') {
                  const storedToken = (typeof sessionManager !== 'undefined' && sessionManager.getToken) ? sessionManager.getToken() : (window.sessionToken || '');
                  if (storedToken && storedToken.trim() !== '') {
                    console.log('Sidebar: No token in URL, using stored token for navigation');
                    currentToken = storedToken;
                    // Add to URL immediately
                    urlParams.set('sessionToken', storedToken);
                    const newUrl = window.location.pathname + '?' + urlParams.toString();
                    try {
                      window.history.replaceState({}, '', newUrl);
                    } catch (e) {
                      console.error('Sidebar: Could not update URL with token:', e);
                    }
                  }
                }
                
                // Ensure we have a token before navigation
                if (!currentToken || currentToken.trim() === '') {
                  console.error('Sidebar: ERROR - No session token available for navigation!');
                  alert('Ingen session token fundet. Du bliver omdirigeret til login.');
                  window.location.href = window.location.pathname + '?page=login';
                  return;
                }
                
                // Fallback navigation - use current URL's base to ensure same web app
                const currentBaseUrl = window.location.origin + window.location.pathname;
                const navParams = new URLSearchParams();
                navParams.set('page', targetPage);
                navParams.set('sessionToken', currentToken); // ALWAYS include token
                const targetUrl = `${currentBaseUrl}?${navParams.toString()}`;
                console.log('Sidebar navigating to (fallback):', targetUrl);
                console.log('Token in sidebar navigation:', currentToken.substring(0, 20) + '...');
                
                // Store token before navigation
                if (typeof sessionManager !== 'undefined' && sessionManager.setToken) {
                  sessionManager.setToken(currentToken);
                }
                
                try {
                  window.location.href = targetUrl;
                } catch (error) {
                  console.error('Sidebar navigation error:', error);
                  try {
                    window.location.replace(targetUrl);
                  } catch (e2) {
                    window.location = targetUrl;
                  }
                }
              }
            }, 120);
          }
    });
  });
}

function setupSidebarAnimations() {
  // Add CSS for ripple animation
  const style = document.createElement('style');
  style.textContent = `
    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
    
    .sidebar-item {
      position: relative;
      overflow: hidden;
    }
  `;
  document.head.appendChild(style);
}

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  sidebar.classList.toggle('collapsed');
}

window.addEventListener('popstate', highlightCurrentPage);
</script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --sidebar-width: 250px;
      --bg: #0f1117;
      --bg-card: #181c27;
      --bg-card2: #1e2235;
      --border: rgba(255,255,255,0.07);
      --border-accent: rgba(102,126,234,0.3);
      --text-primary: #f0f2ff;
      --text-secondary: #8892b0;
      --text-muted: #4a5270;
      --accent: #667eea;
      --accent2: #764ba2;
      --accent-glow: rgba(102,126,234,0.18);
      --green: #43d9ad;
      --green-bg: rgba(67,217,173,0.12);
      --orange: #ffa94d;
      --orange-bg: rgba(255,169,77,0.12);
      --red: #ff6b6b;
      --red-bg: rgba(255,107,107,0.12);
      --blue: #74c0fc;
      --blue-bg: rgba(116,192,252,0.12);
      --purple: #b197fc;
      --purple-bg: rgba(177,151,252,0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }

    main.shell {
      margin-left: var(--sidebar-width);
      width: calc(100% - var(--sidebar-width));
      padding: 36px 40px 60px;
      overflow-x: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .topbar-left h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #a8edea 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-left .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge-time {
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-refresh {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-refresh:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-refresh.loading i { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stat cards row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      cursor: default;
    }

    .stat-card:hover {
      border-color: var(--border-accent);
      transform: translateY(-2px);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .stat-card.c-blue::before  { background: linear-gradient(90deg, var(--blue), #448ef6); }
    .stat-card.c-green::before { background: linear-gradient(90deg, var(--green), #2bcfa0); }
    .stat-card.c-purple::before{ background: linear-gradient(90deg, var(--purple), var(--accent)); }
    .stat-card.c-orange::before{ background: linear-gradient(90deg, var(--orange), #ff8c00); }
    .stat-card.c-accent::before{ background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .stat-card.c-red::before   { background: linear-gradient(90deg, var(--red), #e03030); }

    .stat-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      margin-bottom: 14px;
    }

    .c-blue   .stat-icon { background: var(--blue-bg);   color: var(--blue); }
    .c-green  .stat-icon { background: var(--green-bg);  color: var(--green); }
    .c-purple .stat-icon { background: var(--purple-bg); color: var(--purple); }
    .c-orange .stat-icon { background: var(--orange-bg); color: var(--orange); }
    .c-accent .stat-icon { background: var(--accent-glow); color: var(--accent); }
    .c-red    .stat-icon { background: var(--red-bg);    color: var(--red); }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 6px;
    }

    .stat-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.4;
    }

    .stat-meta .pill {
      display: inline-block;
      background: var(--accent-glow);
      color: var(--accent);
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Main content grid ── */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 360px;
      grid-template-rows: auto auto;
      gap: 18px;
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title i {
      font-size: 14px;
      color: var(--accent);
    }

    .card-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .card-tag.green  { background: var(--green-bg);  color: var(--green); }
    .card-tag.orange { background: var(--orange-bg); color: var(--orange); }
    .card-tag.blue   { background: var(--blue-bg);   color: var(--blue); }
    .card-tag.purple { background: var(--purple-bg); color: var(--purple); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-accent);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
      align-self: flex-start;
    }

    .btn-ghost:hover { background: var(--accent-glow); }

    /* ── Next Event panel ── */
    .event-countdown {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #667eea, #a8edea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .event-countdown-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .event-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .event-detail-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .event-detail-row span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── Upcoming events list ── */
    .event-list { display: flex; flex-direction: column; gap: 10px; }

    .event-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      background: var(--bg-card2);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .event-row:hover { border-color: var(--border-accent); }

    .event-date-badge {
      min-width: 44px;
      text-align: center;
      background: var(--accent-glow);
      border-radius: 8px;
      padding: 6px 4px;
    }

    .event-date-badge .day  { font-size: 18px; font-weight: 800; color: var(--accent); line-height: 1; }
    .event-date-badge .mon  { font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }

    .event-row-info { flex: 1; }
    .event-row-info .title  { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .event-row-info .detail { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* ── Production panel ── */
    .prod-date {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .prod-roles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .prod-role {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }

    .prod-role .role-name {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .prod-role .role-person {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .prod-role .role-person.empty {
      color: var(--text-muted);
      font-weight: 400;
      font-style: italic;
    }

    /* ── Cleaning panel ── */
    .cleaning-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .cleaning-area {
      background: var(--bg-card2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      border: 1px solid var(--border);
    }

    .cleaning-area .area-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .cleaning-area .area-person {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .cleaning-area .area-person.empty {
      color: var(--text-muted);
      font-style: italic;
      font-weight: 400;
    }

    /* ── Activity feed ── */
    .activity-feed { display: flex; flex-direction: column; gap: 0; }

    .activity-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .activity-dot.success { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .activity-dot.warning { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
    .activity-dot.info    { background: var(--blue);   box-shadow: 0 0 6px var(--blue); }
    .activity-dot.error   { background: var(--red);    box-shadow: 0 0 6px var(--red); }

    .activity-body { flex: 1; }
    .activity-body .act-user  { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .activity-body .act-action { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
    .activity-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    /* ── Quick actions ── */
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .quick-btn {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s, transform 0.15s;
      text-align: left;
    }

    .quick-btn:hover { border-color: var(--border-accent); transform: translateY(-1px); }

    .quick-btn .q-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .quick-btn .q-label { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .quick-btn .q-desc  { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* ── Empty / loading ── */
    .loading-shimmer {
      background: linear-gradient(90deg, var(--bg-card2) 25%, var(--bg-card) 50%, var(--bg-card2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 20px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    .empty-note {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
    }

    /* grid spans */
    .span-2 { grid-column: span 2; }

    /* ── Responsive ── */
    @media (max-width: 1300px) {
      .content-grid { grid-template-columns: 1fr 1fr; }
      .span-2 { grid-column: span 1; }
    }

    @media (max-width: 1000px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 768px) {
      :root { --sidebar-width: 0px; }
      main.shell { margin-left: 0; padding: 20px 16px 40px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .content-grid { grid-template-columns: 1fr; }
      .span-2 { grid-column: span 1; }
      .quick-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

          <div class="q-icon" style="background:var(--orange-bg);color:var(--orange)"><i class="fas fa-broom"></i></div>
          <div><div class="q-label">Rengøring</div><div class="q-desc">Se & send påmindelser</div></div>
        </button>
        <button class="quick-btn" onclick="navigateToPage('events')">
          <div class="q-icon" style="background:var(--red-bg);color:var(--red)"><i class="fas fa-calendar-plus"></i></div>
          <div><div class="q-label">Nyt event</div><div class="q-desc">Opret begivenhed</div></div>
        </button>
      </div>
    </div>
  </main>

  <script>
  // Session bootstrap
  (function() {
    try {
      const p = new URLSearchParams(window.location.search);
      const t = p.get('sessionToken');
      if (t && typeof sessionManager !== 'undefined') sessionManager.setToken(t);
    } catch(e) {}
  })();

  // ── Helpers ──────────────────────────────────────────────
  const DA_MONTHS = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  const DA_MONTHS_FULL = ['januar','februar','marts','april','maj','juni','juli','august','september','oktober','november','december'];
  const DA_DAYS = ['søndag','mandag','tirsdag','onsdag','torsdag','fredag','lørdag'];

  function fmt(date) {
    if (!date) return '--';
    const d = new Date(date);
    return `${d.getDate()}. ${DA_MONTHS_FULL[d.getMonth()]} ${d.getFullYear()}`;
  }

  function fmtShort(dateStr) {
    if (!dateStr) return { day: '--', mon: '--' };
    const d = new Date(dateStr);
    return { day: d.getDate(), mon: DA_MONTHS[d.getMonth()] };
  }

  function timeAgo(isoStr) {
    const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
    if (diff < 60) return 'nu';
    if (diff < 3600) return `${Math.floor(diff/60)} min`;
    if (diff < 86400) return `${Math.floor(diff/3600)} t`;
    return `${Math.floor(diff/86400)} d`;
  }

  function actionLabel(action) {
    const map = {
      LOGIN: 'Loggede ind', LOGOUT: 'Loggede ud',
      LOGIN_FAILED: 'Login mislykkedes', SESSION_EXPIRED: 'Session udløbet',
      USER_CREATED: 'Oprettede bruger', USER_DELETED: 'Slettede bruger',
      USER_STATUS_CHANGED: 'Ændrede status', PASSWORD_RESET: 'Nulstillede kodeord',
      PERMISSIONS_BULK_UPDATE: 'Opdaterede rettigheder',
    };
    return map[action] || action.replace(/_/g,' ').toLowerCase();
  }

  function dotClass(status) {
    if (!status) return 'info';
    const s = status.toUpperCase();
    if (s === 'SUCCESS') return 'success';
    if (s === 'WARNING') return 'warning';
    if (s === 'ERROR' || s === 'FAILED') return 'error';
    return 'info';
  }

  // ── Render functions ─────────────────────────────────────
  function renderStats(d) {
    const s = d.stats;

    // Contacts
    document.getElementById('s-contacts').textContent = s.contacts.total;
    document.getElementById('s-contacts-meta').innerHTML =
      `<span class="pill">+${s.contacts.newLast30Days} ny</span> · ${s.contacts.needsFollowUp} opfølgning`;

    // Members
    document.getElementById('s-members').textContent = s.members.total;
    document.getElementById('s-members-meta').innerHTML =
      `${s.members.inTeams} i teams · <span class="pill">${s.members.teamParticipationPct}%</span>`;

    // Teams
    document.getElementById('s-teams').textContent = s.teams.total;
    document.getElementById('s-teams-meta').innerHTML =
      `${s.teams.totalMembers} samlet · Størst: ${s.teams.largestTeam || '—'}`;

    // Groups
    document.getElementById('s-groups').textContent = s.groups.total;
    document.getElementById('s-groups-meta').innerHTML =
      `${s.groups.totalMembers} deltagere i alt`;

    // Events
    document.getElementById('s-events').textContent = s.events.total;
    const dn = s.events.daysToNext;
    document.getElementById('s-events-meta').innerHTML =
      `${s.events.upcoming} kommende · ${dn !== null ? `næste om <span class="pill">${dn}d</span>` : 'ingen planlagte'}`;

    // Cleaning
    const cw = d.cleaning.thisWeek;
    const assigned = cw ? [cw.cafe1, cw.cafe2, cw.salen, cw.toiletter].filter(Boolean).length : 0;
    document.getElementById('s-cleaning').textContent = assigned;
    document.getElementById('s-cleaning-meta').innerHTML =
      cw ? `Uge ${cw.week} · ${assigned}/4 tildelt` : 'Ingen plan denne uge';
  }

  function renderNextEvent(d) {
    const el = document.getElementById('next-event-body');
    const tag = document.getElementById('event-status-tag');
    const events = d.upcomingEvents;

    if (!events.length) {
      el.innerHTML = `<div class="empty-note"><i class="fas fa-calendar-xmark"></i><br>Ingen kommende events</div>`;
      tag.textContent = 'Ingen';
      tag.className = 'card-tag orange';
      return;
    }

    const e = events[0];
    const dn = d.stats.events.daysToNext;
    const countdownText = dn === 0 ? 'I dag!' : dn === 1 ? 'I morgen' : `${dn} dage`;
    tag.textContent = dn === 0 ? 'I dag!' : dn <= 7 ? 'Denne uge' : 'Kommende';

    const details = [
      e.dato ? `<span><i class="fas fa-calendar"></i> ${fmt(e.dato)}</span>` : '',
      e.tid  ? `<span><i class="fas fa-clock"></i> ${e.tid}</span>` : '',
      e.lokation ? `<span><i class="fas fa-location-dot"></i> ${e.lokation}</span>` : '',
      e.team ? `<span><i class="fas fa-people-group"></i> ${e.team}</span>` : '',
    ].filter(Boolean).join('');

    el.innerHTML = `
      <div class="event-countdown">${countdownText}</div>
      <div class="event-countdown-label">til næste event</div>
      <div class="event-name" style="margin-top:14px">${e.titel}</div>
      <div class="event-detail-row" style="margin-top:8px">${details || '<span>Ingen detaljer</span>'}</div>`;
  }

  function renderUpcomingEvents(d) {
    const el = document.getElementById('upcoming-events-list');
    const tag = document.getElementById('upcoming-count-tag');
    const events = d.upcomingEvents;
    tag.textContent = `${events.length} event${events.length !== 1 ? 's' : ''}`;

    if (!events.length) {
      el.innerHTML = `<div class="empty-note">Ingen kommende events planlagt</div>`;
      return;
    }

    el.innerHTML = events.map(e => {
      const {day, mon} = fmtShort(e.dato);
      const sub = [e.tid, e.lokation].filter(Boolean).join(' · ');
      return `<div class="event-row">
        <div class="event-date-badge">
          <div class="day">${day}</div>
          <div class="mon">${mon}</div>
        </div>
        <div class="event-row-info">
          <div class="title">${e.titel}</div>
          ${sub ? `<div class="detail">${sub}</div>` : ''}
        </div>
        <span class="card-tag ${e.status === 'Aktiv' ? 'green' : 'orange'}" style="font-size:10px">${e.status}</span>
      </div>`;
    }).join('');
  }

  function renderProduction(d) {
    const el = document.getElementById('production-body');
    const tag = document.getElementById('prod-date-tag');
    const p = d.nextProduction;

    if (!p) {
      el.innerHTML = `<div class="empty-note"><i class="fas fa-calendar-xmark"></i><br>Ingen produktionsplan oprettet</div>`;
      tag.textContent = 'Ingen';
      return;
    }

    tag.textContent = fmt(p.dato);

    const roles = [
      ['MC', p.mc], ['Forsanger', p.forsanger], ['Lyd', p.lyd],
      ['Kamera', p.kamera], ['Media', p.media], ['Piano', p.piano],
      ['Guitar', p.guitar], ['Trommer', p.trommer], ['Bas', p.bas],
      ['Forkynder', p.forkynder], ['Forsamling', p.forsamling],
      ['Kidz', p.kidz], ['Café 1', p.cafe1], ['Host 1', p.host1],
    ];

    const filled = roles.filter(r => r[1] && r[1].trim());

    el.innerHTML = `
      <div class="prod-date">Søndag d. ${fmt(p.dato)}</div>
      <div class="prod-roles" style="margin-top:12px">
        ${filled.map(([role, person]) => `
          <div class="prod-role">
            <div class="role-name">${role}</div>
            <div class="role-person">${person}</div>
          </div>`).join('')}
        ${!filled.length ? '<div class="empty-note" style="grid-column:span 2">Ingen roller tildelt endnu</div>' : ''}
      </div>`;
  }

  function renderCleaning(d) {
    const el = document.getElementById('cleaning-body');
    const tag = document.getElementById('cleaning-week-tag');
    const cw = d.cleaning.thisWeek;

    if (!cw) {
      const nw = d.cleaning.nextWeek;
      if (nw) {
        tag.textContent = `Uge ${nw.week}`;
        el.innerHTML = `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">Ingen plan denne uge — viser næste uge</div>
          ${renderCleaningGrid(nw)}`;
      } else {
        el.innerHTML = `<div class="empty-note"><i class="fas fa-broom"></i><br>Ingen rengøringsplan oprettet</div>`;
        tag.textContent = 'Ingen';
      }
      return;
    }

    tag.textContent = `Uge ${cw.week}`;
    el.innerHTML = renderCleaningGrid(cw);
  }

  function renderCleaningGrid(cw) {
    const areas = [
      ['Café 1', cw.cafe1], ['Café 2', cw.cafe2],
      ['Salen', cw.salen], ['Toiletter', cw.toiletter],
    ];
    return `<div class="cleaning-grid">
      ${areas.map(([area, person]) => `
        <div class="cleaning-area">
          <div class="area-name">${area}</div>
          <div class="area-person ${person ? '' : 'empty'}">${person || 'Ikke tildelt'}</div>
        </div>`).join('')}
    </div>`;
  }

  function renderActivity(d) {
    const el = document.getElementById('activity-feed');
    const logs = d.recentActivity || [];

    if (!logs.length) {
      el.innerHTML = `<div class="empty-note">Ingen aktivitet registreret</div>`;
      return;
    }

    el.innerHTML = logs.map(l => `
      <div class="activity-item">
        <div class="activity-dot ${dotClass(l.status)}"></div>
        <div class="activity-body">
          <div class="act-user">${l.username}</div>
          <div class="act-action">${actionLabel(l.action)}</div>
        </div>
        <div class="activity-time">${timeAgo(l.timestamp)}</div>
      </div>`).join('');
  }

  function renderGreeting(d) {
    const now = new Date();
    const h = now.getHours();
    const greeting = h < 5 ? 'God nat' : h < 12 ? 'Godmorgen' : h < 18 ? 'God eftermiddag' : 'God aften';
    const username = d.user?.username || 'Administrator';
    document.getElementById('greeting').textContent = `${greeting}, ${username}`;

    const dayName = DA_DAYS[now.getDay()];
    document.getElementById('subtitle-date').textContent =
      `${dayName.charAt(0).toUpperCase() + dayName.slice(1)} d. ${fmt(now.toISOString())} — Overblik over kirkens aktiviteter`;

    const updatedAt = new Date(d.generatedAt || Date.now());
    document.getElementById('last-updated').textContent =
      `Opdateret ${updatedAt.toLocaleTimeString('da-DK', {hour:'2-digit',minute:'2-digit'})}`;
  }

  // ── Load dashboard ────────────────────────────────────────
  function loadDashboard() {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('loading');

    callApi('getDashboardData', {}, function(data) {
      btn.classList.remove('loading');

      if (!data || !data.success) {
        console.error('Dashboard error:', data?.message);
        return;
      }

      renderGreeting(data);
      renderStats(data);
      renderNextEvent(data);
      renderUpcomingEvents(data);
      renderProduction(data);
      renderCleaning(data);
      renderActivity(data);

    }, function(err) {
      btn.classList.remove('loading');
      console.error('Dashboard load failed:', err);
    });
  }

  document.getElementById('btn-refresh').addEventListener('click', loadDashboard);

  // Load on DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadDashboard);
  } else {
    setTimeout(loadDashboard, 100);
  }
  </script>
</body>
</html>

  <script>
    if (typeof sessionManager === 'undefined') {
      window.sessionManager = {
        storageKey: 'sessionToken',
        getToken() {
          try {
            if (typeof window === 'undefined') return '';
            if (window.sessionToken) return window.sessionToken;
            const token = window.localStorage.getItem(this.storageKey);
            if (token) {
              window.sessionToken = token;
              return token;
            }
            return '';
          } catch (error) {
            return window.sessionToken || '';
          }
        },
        setToken(value) {
          try {
            if (typeof window !== 'undefined') {
              if (value) {
                window.localStorage.setItem(this.storageKey, value);
              } else {
                window.localStorage.removeItem(this.storageKey);
              }
            }
          } catch (error) {
            console.error('Error persisting session token:', error);
          }
          window.sessionToken = value || '';
        },
        clearToken() {
          this.setToken('');
        }
      };
    }
    if (typeof callApi !== 'function') {
      window.callApi = function(functionName, params = {}, successHandler = null, failureHandler = null) {
        const token = (typeof sessionManager !== 'undefined' && sessionManager.getToken) ? sessionManager.getToken() : '';
        const payload = { ...params };
        if (token) {
          payload.sessionToken = token;
        }
        let runner = google.script.run;
        if (failureHandler) {
          runner = runner.withFailureHandler(failureHandler);
        }
        if (successHandler) {
          runner = runner.withSuccessHandler(successHandler);
        }
        runner[functionName](payload);
      };
    }
    if (typeof navigateToPage !== 'function') {
      window.navigateToPage = function(page) {
        function ensureExecUrl(url) {
          if (!url) return null;
          let cleanUrl = url.split('?')[0].split('#')[0];
          cleanUrl = cleanUrl.replace(/\/$/, '');
          if (!cleanUrl.endsWith('/exec')) {
            if (cleanUrl.indexOf('script.google.com') !== -1) {
              cleanUrl = cleanUrl + '/exec';
            } else {
              cleanUrl = cleanUrl.replace(/\/(home|dev)$/, '/exec');
              if (!cleanUrl.endsWith('/exec')) {
                cleanUrl = cleanUrl + '/exec';
              }
            }
          }
          return cleanUrl;
        }
        
        try {
          const baseUrl = <?!= JSON.stringify(scriptUrl || '') ?>;
          if (baseUrl) {
            const finalUrl = ensureExecUrl(baseUrl);
            if (finalUrl) {
              window.top.location.href = `${finalUrl}?page=${page}`;
              return;
            }
          }
        } catch (e) {
          console.error('Error getting baseUrl:', e);
        }
        
        google.script.run.withSuccessHandler(function(url) {
          if (url) {
            const finalUrl = ensureExecUrl(url);
            if (finalUrl) {
              window.top.location.href = `${finalUrl}?page=${page}`;
            }
          }
        }).getScriptUrl();
      };
    }
  </script>

  <div class="main-content">

  <!-- Modal til redigering af tilladelser -->
  <div id="editPermissionsModal" class="modal">
    <div class="modal-content">
      <h3>Rediger Tilladelser</h3>
      <p>Bruger: <strong id="editUsername"></strong></p>
      
      <div class="permission-editor" id="permissionEditor">
        <!-- Tilladelsesgrupper vil blive indsat her -->
      </div>
      
      <div style="text-align: right; margin-top: 20px;">
        <button onclick="hideModal('editPermissionsModal')" class="btn-small" style="background: #6c757d; color: white;">Annuller</button>
        <button onclick="savePermissions()" class="btn-small btn-edit" style="margin-left: 10px;">Gem Ændringer</button>

    </div>

  <!-- Modal til oprettelse af ny bruger -->
  <div id="createUserModal" class="modal">
    <div class="modal-content">
      <h3>Opret Ny Bruger</h3>
      
      <div style="margin: 20px 0;">
        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Brugernavn:</label>
        <input type="text" id="newUsername" style="width: 100%; padding: 10px; margin: 5px 0; border: 2px solid #e1e8ed; border-radius: 6px;">
        
        <label style="display: block; margin-bottom: 5px; font-weight: 500; margin-top: 15px;">Password:</label>
        <input type="password" id="newPassword" style="width: 100%; padding: 10px; margin: 5px 0; border: 2px solid #e1e8ed; border-radius: 6px;">
      </div>
      
      <h4 style="margin-top: 20px;">Tilladelser:</h4>
      <div class="permission-editor" id="newUserPermissionEditor">
        <!-- Tilladelsesgrupper for ny bruger -->
      </div>
      
      <div style="text-align: right; margin-top: 20px;">
        <button onclick="hideModal('createUserModal')" class="btn-small" style="background: #6c757d; color: white;">Annuller</button>
        <button onclick="createUser()" class="btn-small btn-edit" style="margin-left: 10px;">Opret Bruger</button>
      </div>
    </div>
  </div>

  <script>
    let allUsers = [];
    let currentEditingUser = null;
    let hasAdminAccess = false;
    const pages = ['kontakter', 'medlemmer', 'teams', 'rengoring', 'produktion', 'grupper', 'events', 'logins'];
    const permissionLevels = ['Ingen', 'Læser', 'Redaktør'];
    
    // Check access on page load
    document.addEventListener('DOMContentLoaded', function() {
      checkAccess();
    });

    function checkAccess() {
      // Check access by trying to load users - if it fails, show access denied
      loadUsers();
    }

    function loadUsers() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('userGrid').style.display = 'none';
      
      callApi('getAllUsersWithPermissionsApi', {}, function(response) {
          document.getElementById('loading').style.display = 'none';
          
          if (response.success) {
            hasAdminAccess = true;
            document.getElementById('userManagement').style.display = 'block';
            document.getElementById('accessDenied').style.display = 'none';
            document.getElementById('userGrid').style.display = 'grid';
            allUsers = response.users;
            displayUsers(allUsers);
            updateStats();
          } else {
            // No access or error
            hasAdminAccess = false;
            document.getElementById('userManagement').style.display = 'none';
            document.getElementById('accessDenied').style.display = 'block';
            showAlert(response.message || 'Ingen adgang', 'error');
          }
      }, function(error) {
          document.getElementById('loading').style.display = 'none';
          hasAdminAccess = false;
          document.getElementById('userManagement').style.display = 'none';
          document.getElementById('accessDenied').style.display = 'block';
          console.error('Error loading users:', error);
      });
    }

    function displayUsers(users) {
      const container = document.getElementById('userGrid');
      container.innerHTML = '';
      
      users.forEach(user => {
        const userCard = createUserCard(user);
        container.appendChild(userCard);
      });
    }

    function createUserCard(user) {
      const div = document.createElement('div');
      div.className = 'user-card';
      
      const permissionsHTML = pages.map(page => `
        <div class="permission-item">
          <span class="permission-label">${page.charAt(0).toUpperCase() + page.slice(1)}</span>
          <span class="permission-value perm-${(user.permissions[page] || 'Ingen').toLowerCase().replace(/æ/g, 'a').replace(/ø/g, 'o').replace(/å/g, 'a')}">${user.permissions[page] || 'Ingen'}</span>
        </div>
      `).join('');
      
      const lastLogin = user.lastLogin ? new Date(user.lastLogin).toLocaleDateString('da-DK') : 'Aldrig';
      const failedAttempts = user.failedAttempts || 0;
      
      div.innerHTML = `
        <div class="user-header">
          <div class="user-name">${user.username}</div>
          <span class="user-status status-${user.status.toLowerCase()}">${user.status}</span>
        </div>
        
        <div class="user-info">
          <div><strong>Sidste login:</strong> ${lastLogin}</div>
          <div><strong>Fejlede forsøg:</strong> ${failedAttempts}</div>
          ${user.lockedUntil ? '<div style="color: #dc3545;"><strong>Låst indtil:</strong> ' + new Date(user.lockedUntil).toLocaleString('da-DK') + '</div>' : ''}
        </div>
        
        <div class="permissions-grid">
          ${permissionsHTML}
        </div>
        
        <div class="user-actions">
          <button class="btn-small btn-edit" onclick="editUserPermissions('${user.username}')">
            <i class="fas fa-edit"></i> Rediger
          </button>
          ${user.status === 'Aktiv' ? 
            '<button class="btn-small btn-deactivate" onclick="toggleUserStatus(\'' + user.username + '\', \'Inaktiv\')"><i class="fas fa-ban"></i> Deaktiver</button>' :
            '<button class="btn-small btn-activate" onclick="toggleUserStatus(\'' + user.username + '\', \'Aktiv\')"><i class="fas fa-check"></i> Aktiver</button>'
          }
        </div>
      `;
      
      return div;
    }

    function editUserPermissions(username) {
      currentEditingUser = username;
      const user = allUsers.find(u => u.username === username);
      
      document.getElementById('editUsername').textContent = username;
      
      const editor = document.getElementById('permissionEditor');
      editor.innerHTML = '';
      
      pages.forEach(page => {
        const group = document.createElement('div');
        group.className = 'permission-group';
        const currentPerm = user.permissions[page] || 'Ingen';
        group.innerHTML = `
          <h4>${page.charAt(0).toUpperCase() + page.slice(1)}</h4>
          ${permissionLevels.map(level => `
            <div class="permission-radio">
              <input type="radio" 
                     name="perm_${page}" 
                     value="${level}" 
                     id="${page}_${level}"
                     ${currentPerm === level ? 'checked' : ''}>
              <label for="${page}_${level}">${level}</label>
            </div>
          `).join('')}
        `;
        editor.appendChild(group);
      });
      
      showModal('editPermissionsModal');
    }

    function savePermissions() {
      const permissions = {};
      
      pages.forEach(page => {
        const selected = document.querySelector('input[name="perm_' + page + '"]:checked');
        permissions[page] = selected ? selected.value : 'Ingen';
      });
      
      callApi('bulkUpdatePermissionsApi', { username: currentEditingUser, permissions: permissions }, function(response) {
        if (response.success) {
          showAlert(response.message, 'success');
          hideModal('editPermissionsModal');
          loadUsers();
        } else {
          showAlert(response.message, 'error');
        }
      }, function(error) {
        showAlert('Fejl: ' + error, 'error');
      });
    }

    function toggleUserStatus(username, newStatus) {
      callApi('updateUserStatusApi', { username: username, newStatus: newStatus }, function(response) {
        if (response.success) {
          showAlert(response.message, 'success');
          loadUsers();
        } else {
          showAlert(response.message, 'error');
        }
      }, function(error) {
        showAlert('Fejl: ' + error, 'error');
      });
    }

    function showCreateUserModal() {
      const editor = document.getElementById('newUserPermissionEditor');
      editor.innerHTML = '';
      
      pages.forEach(page => {
        const group = document.createElement('div');
        group.className = 'permission-group';
        group.innerHTML = `
          <h4>${page.charAt(0).toUpperCase() + page.slice(1)}</h4>
          ${permissionLevels.map(level => `
            <div class="permission-radio">
              <input type="radio" 
                     name="new_perm_${page}" 
                     value="${level}" 
                     id="new_${page}_${level}"
                     ${level === 'Ingen' ? 'checked' : ''}>
              <label for="new_${page}_${level}">${level}</label>
            </div>
          `).join('')}
        `;
        editor.appendChild(group);
      });
      
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
      showModal('createUserModal');
    }

    function createUser() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value.trim();
      
      if (!username || !password) {
        showAlert('Udfyld venligst brugernavn og password', 'error');
        return;
      }
      
      const permissions = {};
      pages.forEach(page => {
        const selected = document.querySelector('input[name="new_perm_' + page + '"]:checked');
        permissions[page] = selected ? selected.value : 'Ingen';
      });
      
      const userData = {
        username: username,
        password: password,
        permissions: permissions
      };
      
      callApi('createNewUserApi', { userData: userData }, function(response) {
        if (response.success) {
          showAlert(response.message, 'success');
          hideModal('createUserModal');
          loadUsers();
        } else {
          showAlert(response.message, 'error');
        }
      }, function(error) {
        showAlert('Fejl: ' + error, 'error');
      });
    }

    function filterUsers() {
      const searchTerm = document.getElementById('userSearch').value.toLowerCase();
      const filteredUsers = allUsers.filter(user => 
        user.username.toLowerCase().includes(searchTerm)
      );
      displayUsers(filteredUsers);
    }

    function updateStats() {
      const total = allUsers.length;
      const active = allUsers.filter(u => u.status === 'Aktiv').length;
      const inactive = total - active;
      const admins = allUsers.filter(u => (u.permissions.logins || 'Ingen') === 'Redaktør').length;
      
      document.getElementById('totalUsers').textContent = total;
      document.getElementById('activeUsers').textContent = active;
      document.getElementById('inactiveUsers').textContent = inactive;
      document.getElementById('adminUsers').textContent = admins;
    }

    function showModal(modalId) {
      document.getElementById(modalId).style.display = 'block';
    }

    function hideModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    function showAlert(message, type) {
      if (typeof showToast === 'function') {
        showToast(message, type);
      } else {
        alert(message);
      }
    }

    window.onclick = function(event) {
      if (event.target.classList.contains('modal')) {
        event.target.style.display = 'none';
      }
    }
  </script>

            <i class="fas fa-plus"></i> Opret Ny Skabelon
          </button>
        </div>
        
        <div id="templates-list">
          <!-- Templates will be populated here -->
        </div>

        <!-- Create Template Form -->
        <div id="create-template-form" style="display: none;">
          <hr>
          <h4>Opret Ny Skabelon</h4>
          <div class="form-group">
            <label class="form-label">Skabelon Navn *</label>
            <input type="text" class="form-control" id="template-name" placeholder="f.eks. Søndags Gudstjeneste">

          <div class="form-group">

  <script>
    // Global variables
    let events = [];
    let teams = [];
    let members = [];
    let contacts = [];
    let eventTemplates = [];
    let currentWeekStart = new Date();
    let currentEditEventId = null;

    // Navigation function
    function navigateToPage(page) {
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbyqf60NKXYCOhimJq7MbutuFJDqOqb5aJVFJXGWSvmfWNd8osWpc0yJ-7ro78VpLK7ljw/exec';
      window.top.location.href = scriptUrl + '?page=' + page;
    }

    // Logout function
    function logout() {
      showToast('Logger ud...', 'info');
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbyqf60NKXYCOhimJq7MbutuFJDqOqb5aJVFJXGWSvmfWNd8osWpc0yJ-7ro78VpLK7ljw/exec';
      window.top.location.href = scriptUrl + '?page=login';
    }

    // Initialize page
    document.addEventListener('DOMContentLoaded', function() {
      setCurrentWeek();
      loadAllData();
      setupEventHandlers();
      renderCalendar();
    });

    // Setup event handlers
    function setupEventHandlers() {
      // Sidebar navigation
      const sidebarItems = document.querySelectorAll('.sidebar-item[data-page]');
      sidebarItems.forEach(item => {
        item.addEventListener('click', function() {
          const page = this.dataset.page;
          if (page) {
            navigateToPage(page);
          }
        });
      });

      // Search functionality
      document.getElementById('search-events').addEventListener('keyup', function() {
        const filter = this.value.toLowerCase();
        filterEvents(filter);
      });

      // Close modals when clicking outside
      window.addEventListener('click', function(event) {
        if (event.target.classList.contains('modal')) {
          event.target.style.display = 'none';
        }
      });
    }

    // Set current week
    function setCurrentWeek() {
      const today = new Date();
      const monday = new Date(today);
      monday.setDate(today.getDate() - today.getDay() + 1);
      currentWeekStart = monday;
      updateCalendarTitle();
    }

    // Update calendar title
    function updateCalendarTitle() {
      const options = { month: 'long', year: 'numeric' };
      const monthYear = currentWeekStart.toLocaleDateString('da-DK', options);
      document.getElementById('calendar-title').textContent = `Events Kalender - ${monthYear}`;
    }

    // Load all data
    function loadAllData() {
    
      loadEvents();
      loadTeams();
      loadMembers();
      loadContacts();
      loadEventTemplates();
    }

    // Load events
    function loadEvents() {
      console.log("Loading events...");
      callApi('getAllEvents', {}, function(result) {
        console.log("Events loaded:", result);
        if (result && result.success) {
          events = result.data || [];
          console.log("Events array length:", events.length);
          if (events.length > 0) {
            console.log("First event:", events[0]);
          }
          renderCalendar();
          renderEventsList();
        } else {
          console.error("Error loading events:", result ? result.message : 'Unknown error');
          showToast(result && result.message ? result.message : 'Fejl ved indlæsning af events', 'error');
          events = [];
          renderCalendar();
          renderEventsList();
        }
      }, function(error) {
        console.error("Failed to load events:", error);
        showToast('Fejl ved indlæsning: ' + error, 'error');
        events = [];
        renderCalendar();
        renderEventsList();
      });
    }

    // Load teams
    function loadTeams(callback = null) {
      callApi('getAllTeams', {}, function(result) {
        if (Array.isArray(result)) {
          teams = result;
          populateTeamSelectors();
          if (callback) callback(teams);
        } else if (result && result.success) {
          teams = result.data || result.teams || [];
          populateTeamSelectors();
          if (callback) callback(teams);
        } else {
          console.error('Error loading teams:', result ? result.message : 'Unknown error');
          teams = [];
          if (callback) callback([]);
        }
      }, function(error) {
        console.error('Error loading teams:', error);
        teams = [];
        if (callback) callback([]);
      });
    }

    // Load members
    function loadMembers() {
      callApi('getAllMembers', {}, function(result) {
        if (result.success) {
          members = result.members || result.data || [];
          populateResponsibleSelector();
        } else {
          console.error('Error loading members:', result.message);
          members = [];
        }
      }, function(error) {
        console.error('Error loading members:', error);
        members = [];
      });
    }

    // Load contacts
    function loadContacts() {
      callApi('getAllContactsSimple', {}, function(result) {
        if (result && result.success) {
          contacts = result.contacts || result.data || [];
          console.log('Loaded ' + contacts.length + ' contacts');
        } else {
          console.error('Error loading contacts:', result ? result.message : 'Unknown error');
          contacts = [];
        }
      }, function(error) {
        console.error('Error loading contacts:', error);
        contacts = [];
      });
    }

    // Load event templates
    function loadEventTemplates() {
      callApi('getEventTemplates', {}, function(result) {
        if (result && result.success) {
          eventTemplates = result.templates || [];
          populateTemplateSelector();
          renderTemplatesList();
        } else {
          console.error('Error loading event templates:', result ? result.message : 'Unknown error');
          eventTemplates = [];
          populateTemplateSelector();
        }
      }, function(error) {
        console.error('Error loading event templates:', error);
        eventTemplates = [];
        populateTemplateSelector();
      });
    }

    // Calendar navigation
    function previousWeek() {
      currentWeekStart.setDate(currentWeekStart.getDate() - 7);
      updateCalendarTitle();
      renderCalendar();
    }

    function nextWeek() {
      currentWeekStart.setDate(currentWeekStart.getDate() + 7);
      updateCalendarTitle();
      renderCalendar();
    }

    function currentWeek() {
      setCurrentWeek();
      renderCalendar();
    }

    // View toggle
    function showCalendarView() {
      document.getElementById('visual-calendar').style.display = 'block';
      document.getElementById('events-list').style.display = 'none';
      document.getElementById('calendar-view-btn').classList.add('active');
      document.getElementById('list-view-btn').classList.remove('active');
    }

    function showListView() {
      document.getElementById('visual-calendar').style.display = 'none';
      document.getElementById('events-list').style.display = 'block';
      document.getElementById('list-view-btn').classList.add('active');
      document.getElementById('calendar-view-btn').classList.remove('active');
    }

    // Render calendar
    function renderCalendar() {
      const timeGrid = document.getElementById('time-grid');
      if (!timeGrid) {
        console.error("time-grid element not found");
        return;
      }
      
      console.log("Rendering calendar with", events.length, "events");
      let html = '';

      // Headers - Outlook style
      html += '<div class="time-header">Tid</div>';
      const today = new Date();
      today.setHours(0,0,0,0);
      
      for (let i = 0; i < 7; i++) {
        const date = new Date(currentWeekStart);
        date.setDate(currentWeekStart.getDate() + i);
        date.setHours(0,0,0,0);
        const dayName = date.toLocaleDateString('da-DK', { weekday: 'short' });
        const dayNum = date.getDate();
        const monthName = date.toLocaleDateString('da-DK', { month: 'short' });
        const isToday = date.getTime() === today.getTime();
        html += `<div class="time-header" ${isToday ? 'style="background: #deecf9; color: #0078d4; font-weight: 700;"' : ''}>
          <div style="font-size: 11px; color: #666; margin-bottom: 2px;">${dayName}</div>
          <div style="font-size: 16px;">${dayNum}</div>
          <div style="font-size: 10px; color: #999; margin-top: 2px;">${monthName}</div>
        </div>`;
      }

      // Time slots from 8:00 to 00:00 (24:00) - Outlook style with better spacing
      
      for (let hour = 8; hour <= 24; hour++) {
        const displayHour = hour === 24 ? '00' : hour.toString().padStart(2, '0');
        html += `<div class="time-slot">${displayHour}:00</div>`;
        
        for (let day = 0; day < 7; day++) {
          const date = new Date(currentWeekStart);
          date.setDate(currentWeekStart.getDate() + day);
          date.setHours(0,0,0,0);
          const isToday = date.getTime() === today.getTime();
          
          const dayEvents = getEventsForDateTime(date, hour);
          let cellContent = '';
          
          dayEvents.forEach(event => {
            const eventClass = getEventTypeClass(event.type || 'service');
            const timeInfo = event.startTime ? ` - ${event.startTime}` : '';
            cellContent += `
              <div class="event-block ${eventClass}" onclick="event.stopPropagation(); editEvent(${event.id})" title="${event.name}${timeInfo}${event.location ? ' @ ' + event.location : ''}">
                <strong>${event.name}</strong>${timeInfo ? '<br><small>' + timeInfo + '</small>' : ''}
              </div>
            `;
          });
          
          html += `<div class="day-column ${isToday ? 'today' : ''}" onclick="addEventAtTime('${formatDate(date)}', ${hour})">${cellContent}</div>`;
        }
      }

      timeGrid.innerHTML = html;
    }

    // Get events for specific date and hour
    function getEventsForDateTime(date, hour) {
      const dateStr = formatDate(date);
      console.log("Looking for events on date:", dateStr, "hour:", hour);
      console.log("Total events:", events.length);
      
      return events.filter(event => {
        if (!event || !event.date) return false;
        
        // Convert event date to same format for comparison
        let eventDateStr = "";
        try {
          if (event.date instanceof Date) {
            eventDateStr = formatDate(event.date);
          } else if (typeof event.date === 'string') {
            // Try to parse the date string
            const parsedDate = new Date(event.date);
            if (!isNaN(parsedDate.getTime())) {
              eventDateStr = formatDate(parsedDate);
            } else {
              // If it's already in YYYY-MM-DD format, use it directly
              if (event.date.match(/^\d{4}-\d{2}-\d{2}$/)) {
                eventDateStr = event.date;
              }
            }
          }
        } catch (e) {
          console.error("Error parsing event date:", e, event);
          return false;
        }
        
        console.log("Comparing:", eventDateStr, "===", dateStr, "?", eventDateStr === dateStr);
        if (eventDateStr !== dateStr) return false;
        
        // If no start time, show at 8AM
        if (!event.startTime) {
          return hour === 8;
        }
        
        // Parse hour from start time
        try {
          const eventHour = parseInt(event.startTime.split(':')[0]);
          return eventHour === hour;
        } catch (e) {
          console.error("Error parsing start time:", e, event);
          return hour === 8; // Default to 8AM on error
        }
      });
    }

    // Get event type CSS class
    function getEventTypeClass(type) {
      const typeMap = {
        'service': 'primary',
        'meeting': 'secondary',
        'conference': 'success',
        'workshop': 'warning',
        'social': 'info',
        'music': 'music',
        'media': 'media',
        'host': 'host',
        'cafe': 'cafe',
        'cleaning': 'cleaning'
      };
      return typeMap[type] || 'primary';
    }

    // Render events list
    function renderEventsList() {
      const container = document.getElementById('events-container');
      
      if (events.length === 0) {
        container.innerHTML = '<div class="text-center" style="padding: 40px;">Ingen events fundet</div>';
        return;
      }

      let html = '';
      
      // Sort events by date
      const sortedEvents = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));
      
      sortedEvents.forEach(event => {
        html += `
          <div class="event-card">
            <div class="event-card-header">
              <h3 class="event-card-title">${event.name}</h3>
              <div class="event-card-actions">
                <button class="btn btn-sm" onclick="editEvent(${event.id})">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteEvent(${event.id})">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
            <div class="event-card-body">
              <div class="event-info">
                <div class="event-detail">
                  <i class="fas fa-calendar"></i>
                  <span>${formatDisplayDate(event.date)}</span>
                </div>
                <div class="event-detail">
                  <i class="fas fa-clock"></i>
                  <span>${event.startTime || 'Ingen tid angivet'} ${event.endTime ? '- ' + event.endTime : ''}</span>
                </div>
                <div class="event-detail">
                  <i class="fas fa-map-marker-alt"></i>
                  <span>${event.location || 'Ingen lokation angivet'}</span>
                </div>
                <div class="event-detail">
                  <i class="fas fa-user"></i>
                  <span>${event.responsible || 'Ingen ansvarlig angivet'}</span>
                </div>
              </div>
              ${event.description ? `<p style="margin-top: 10px; color: var(--secondary);">${event.description}</p>` : ''}
              ${renderEventTeams(event)}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }

    // Render event teams
    function renderEventTeams(event) {
      if (!event.teams || event.teams.length === 0) {
        return '';
      }

      let html = '<div class="team-assignments">';
      
      event.teams.forEach(teamAssignment => {
        html += `
          <div class="team-section">
            <div class="team-name">${teamAssignment.teamName}</div>
            <div class="team-members">
        `;
        
        if (teamAssignment.members && teamAssignment.members.length > 0) {
          teamAssignment.members.forEach(member => {
            html += `<span class="member-badge">${member}</span>`;
          });
        } else {
          html += `<span class="member-badge" style="color: var(--secondary);">Ingen medlemmer tildelt</span>`;
        }
        
        html += `
            </div>
          </div>
        `;

    // Edit event

    // Helper function to populate the event form
    function populateEventForm(event) {
      // Populate form
      document.getElementById('event-id').value = event.id;
      document.getElementById('event-name').value = event.name || event.title || '';
      document.getElementById('event-type').value = event.type || 'service';
      document.getElementById('event-date').value = event.date || '';
      document.getElementById('event-start-time').value = event.startTime || '';
      document.getElementById('event-end-time').value = event.endTime || '';
      document.getElementById('event-location').value = event.location || '';
      document.getElementById('event-description').value = event.description || '';

      // Populate responsible field
      const responsibleSelect = document.getElementById('event-responsible');
      if (responsibleSelect) {
        // Ensure the responsible selector is populated
        populateResponsibleSelector();
        
        // Set the responsible value if it exists
        const responsibleValue = event.responsible || '';
        if (responsibleValue) {
          // Try to find the exact match first
          let found = false;
          for (let i = 0; i < responsibleSelect.options.length; i++) {
            if (responsibleSelect.options[i].value === responsibleValue) {
              responsibleSelect.selectedIndex = i;
              found = true;
              break;
            }
          }
          
          // If not found, try to set it anyway
          if (!found) {
            responsibleSelect.value = responsibleValue;
          }
        } else {
          responsibleSelect.value = '';
        }
      }

      // Update modal title and show delete button
      document.getElementById('event-modal-title').textContent = 'Rediger Event';
      document.getElementById('delete-event-btn').style.display = 'inline-flex';

      // Load team assignments
      document.getElementById('team-assignments').innerHTML = '';
      
      // Store current event tasks for reference
      window.currentEventTasks = event.tasks || [];
      
      if (event.teams && event.teams.length > 0) {
        event.teams.forEach(teamAssignment => {
          const assignmentId = addTeamAssignment(teamAssignment);
          // Only proceed if assignmentId is valid
          if (assignmentId && teamAssignment.tasks && teamAssignment.tasks.length > 0) {
            setTimeout(() => {
              loadTasksForTeam(assignmentId, teamAssignment.members);
            }, 300);
          }
        });
      } else {
        // Don't automatically add empty team assignment
        // addTeamAssignment(); // Add empty team assignment
      }

      // Load task assignments (now integrated with teams)
      // Tasks are now handled within team assignments, so no separate task loading needed

      showModal('add-event-modal', true);
    }

    // Save event
    function saveEvent() {
      const eventData = {
        id: currentEditEventId,
        name: document.getElementById('event-name').value.trim(),
        type: document.getElementById('event-type').value,
        date: document.getElementById('event-date').value,
        startTime: document.getElementById('event-start-time').value,
        endTime: document.getElementById('event-end-time').value,
        location: document.getElementById('event-location').value.trim(),
        responsible: document.getElementById('event-responsible').value,
        description: document.getElementById('event-description').value.trim(),
        teams: getTeamAssignments()
      };

      // Extract all tasks from team assignments
      const allTasks = [];
      eventData.teams.forEach(team => {
        if (team.tasks && team.tasks.length > 0) {
          allTasks.push(...team.tasks);
        }
      });
      
      eventData.tasks = allTasks;

      if (!eventData.name || !eventData.date) {
        showToast('Event navn og dato er påkrævet', 'error');
        return;
      }

      const functionName = currentEditEventId ? 'updateEvent' : 'addEvent';

      callApi(functionName, eventData, function(result) {
        if (result.success) {
          showToast(currentEditEventId ? 'Event opdateret!' : 'Event oprettet!', 'success');
          hideModal('add-event-modal');
          loadEvents(); // Reload events
        } else {
          showToast(result.message || 'Fejl ved gemning af event', 'error');
        }
      }, function(error) {
        showToast('Fejl: ' + error, 'error');
      });
    }

    // Delete event
    function deleteEvent(eventId = null) {
      const id = eventId || currentEditEventId;
      if (!id) {
        showToast('Intet event valgt', 'error');
        return;
      }

      if (!confirm('Er du sikker på at du vil slette dette event? Dette kan ikke fortrydes.')) {
        return;
      }

      callApi('deleteEvent', { id: id }, function(result) {
        if (result.success) {
          showToast('Event slettet!', 'success');
          if (!eventId) hideModal('add-event-modal');
          loadEvents();
        } else {
          showToast(result.message || 'Fejl ved sletning af event', 'error');
        }
      }, function(error) {
        showToast('Fejl: ' + error, 'error');
      });
    }

    // Team assignment functions
    function addTeamAssignment(existingAssignment = null) {
      const container = document.getElementById('team-assignments');
      if (!container) {
        console.error('Team assignments container not found');
        return null;
      }
      
              const assignmentId = 'team-assignment-' + Date.now() + '-' + Math.floor(Math.random() * 1000000);

            <label class="form-label">Vælg Team</label>

      `;

      if (teams && teams.length > 0) {

          const selected = existingAssignment && existingAssignment.teamName === team.name ? 'selected' : '';
          html += `<option value="${team.name}" ${selected}>${team.name}</option>`;
        });
      } else {
        // If teams not loaded, try to load them and wait
        loadTeams((loadedTeams) => {
          if (loadedTeams && loadedTeams.length > 0) {
            const teamSelector = document.querySelector(`#${assignmentId} .team-selector`);
            if (teamSelector) {
              // Repopulate the selector
              let optionsHtml = '<option value="">Vælg team...</option>';

                const selected = existingAssignment && existingAssignment.teamName === team.name ? 'selected' : '';
                optionsHtml += `<option value="${team.name}" ${selected}>${team.name}</option>`;
              });
              teamSelector.innerHTML = optionsHtml;
            }
          }
        });
      }
      
      html += `
            </select>
          </div>
          <div class="member-selection" id="${assignmentId}-members">
            <!-- Team members will be populated here -->
          </div>
          <div class="task-assignments" id="${assignmentId}-tasks" style="display: none;">
            <label class="form-label">Opgave Tildeling</label>

              <i class="fas fa-plus"></i> Tilføj Opgave
            </button>
          </div>

          if (existingAssignment.tasks && existingAssignment.tasks.length > 0) {
            setTimeout(() => {
              loadTasksForTeam(assignmentId, existingAssignment.members);

    function removeTeamAssignment(assignmentId) {
      const element = document.getElementById(assignmentId);
      if (element) {
        element.remove();
      }
    }

    function loadTeamMembers(assignmentId, selectedMembers = []) {
      const membersContainer = document.getElementById(`${assignmentId}-members`);
      const taskContainer = document.getElementById(`${assignmentId}-tasks`);

      if (!membersContainer) {
        console.error('Members container not found for:', assignmentId);
        return;
      }

      const teamSelector = document.querySelector(`#${assignmentId} .team-selector`);
      if (!teamSelector) {
        console.error('Team selector not found for:', assignmentId);
        return;
      }

      const teamName = teamSelector.value;
      
      if (!teamName) {
        membersContainer.innerHTML = '';
        if (taskContainer) taskContainer.style.display = 'none';
        return;
      }
      
      // Ensure teams are loaded - wait for them to be available
      if (!teams || teams.length === 0) {
        loadTeams((loadedTeams) => {
          if (loadedTeams && loadedTeams.length > 0) {
            // Retry loading team members now that teams are available
            loadTeamMembers(assignmentId, selectedMembers);
          }
        });
        return;
      }
      
      const team = teams.find(t => t.name === teamName);
      
      if (!team) {
        membersContainer.innerHTML = '<p>Team ikke fundet: ' + teamName + '</p>';
        if (taskContainer) taskContainer.style.display = 'none';
        return;
      }
      
      if (!team.members || team.members.length === 0) {
        membersContainer.innerHTML = '<p>Ingen medlemmer fundet for dette team</p>';
        if (taskContainer) taskContainer.style.display = 'none';
        return;
      }
      
      let html = '<label class="form-label">Vælg Medlemmer</label>';
      
      team.members.forEach(member => {
        const checked = selectedMembers.includes(member) ? 'checked' : '';
        const memberId = `${assignmentId}-${member.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '')}`;
        html += `
          <div class="member-checkbox">
            <input type="checkbox" id="${memberId}" value="${member}" ${checked} onchange="toggleTaskAssignment('${assignmentId}', '${member}')">
            <label for="${memberId}">${member}</label>
          </div>
        `;
      });
      
      // Add contacts if available
      if (contacts && contacts.length > 0) {
        html += '<hr><label class="form-label">Kontakter</label>';
        contacts.forEach(contact => {
          const contactName = `${contact.fornavn} ${contact.efternavn}`;
          const checked = selectedMembers.includes(contactName) ? 'checked' : '';
          const contactId = `${assignmentId}-contact-${contact.id || contact.fornavn.replace(/\s+/g, '-')}`;
          html += `
            <div class="member-checkbox">
              <input type="checkbox" id="${contactId}" value="${contactName}" ${checked} onchange="toggleTaskAssignment('${assignmentId}', '${contactName}')">
              <label for="${contactId}">${contactName}</label>
            </div>
          `;
        });
      }
      
      membersContainer.innerHTML = html;
      
      // Show task assignment section if team has members
      if (team.members && team.members.length > 0 && taskContainer) {
        taskContainer.style.display = 'block';
        loadTasksForTeam(assignmentId, selectedMembers);
      } else if (taskContainer) {
        taskContainer.style.display = 'none';
      }
    }

    function toggleTaskAssignment(assignmentId, memberName) {
      const taskContainer = document.getElementById(`${assignmentId}-tasks`);
      if (!taskContainer) {
        console.error('Task container not found for:', assignmentId);
        return;
      }

      const taskList = document.getElementById(`${assignmentId}-task-list`);
      if (!taskList) {
        console.error('Task list not found for:', assignmentId);
        return;
      }

      // Check if member is selected - use a more robust selector
      let memberCheckbox = document.querySelector(`#${assignmentId} input[value="${memberName}"]`);
      if (!memberCheckbox) {
        // Try alternative selector if the first one fails
        memberCheckbox = document.querySelector(`#${assignmentId} .member-selection input[value="${memberName}"]`);
        if (!memberCheckbox) {
          console.error('Could not find member checkbox for:', memberName, 'in assignment:', assignmentId);
          return;
        }
      }

      const isChecked = memberCheckbox.checked;

      if (isChecked) {
        // Show task container and add task assignment for this member
        taskContainer.style.display = 'block';
        addTaskToTeam(assignmentId, memberName);
      } else {
        // Remove tasks assigned to this member
        const memberTasks = taskList.querySelectorAll(`[data-member="${memberName}"]`);
        memberTasks.forEach(task => task.remove());
        
        // Hide task container if no tasks remain
        if (taskList.children.length === 0) {
          taskContainer.style.display = 'none';
        }
      }
    }

    function loadTasksForTeam(assignmentId, selectedMembers) {
      const taskList = document.getElementById(`${assignmentId}-task-list`);
      if (!taskList) return;

      taskList.innerHTML = ''; // Clear previous tasks

      // Load existing tasks for selected members
      if (selectedMembers && selectedMembers.length > 0) {
        selectedMembers.forEach(member => {
          // Check if there are existing tasks for this member
          const existingTasks = window.currentEventTasks ? window.currentEventTasks.filter(task => task.responsible === member) : [];
          
          if (existingTasks.length > 0) {
            existingTasks.forEach(task => {
              addTaskToTeam(assignmentId, member, task);
            });
          } else {
            addTaskToTeam(assignmentId, member);
          }
        });
      }
    }

    function addTaskToTeam(assignmentId, memberName = null, existingTask = null) {
      const taskList = document.getElementById(`${assignmentId}-task-list`);
      if (!taskList) {
        console.error('Task list not found for:', assignmentId);
        return;
      }

      const taskId = `task-${assignmentId}-${Date.now()}-${Math.floor(Math.random() * 1000000)}`;
      
      let html = `
        <div class="task-assignment-item" id="${taskId}" data-member="${memberName || ''}">
          <div class="task-header">
            <label class="form-label">Opgave Beskrivelse</label>
            <input type="text" class="form-control task-description" value="${existingTask ? existingTask.description : ''}" placeholder="Beskriv opgaven...">
          </div>
          
          <div class="task-timing">
            <label class="form-label">Timing</label>
            <select class="form-control task-timing-select">
              <option value="before" ${existingTask && existingTask.timing === 'before' ? 'selected' : ''}>Før event</option>
              <option value="during" ${existingTask && existingTask.timing === 'during' ? 'selected' : ''}>Under event</option>
              <option value="after" ${existingTask && existingTask.timing === 'after' ? 'selected' : ''}>Efter event</option>
            </select>
          </div>
          
          <div class="task-duration">
            <label class="form-label">Varighed (minutter)</label>
            <input type="number" class="form-control task-duration-input" value="${existingTask ? existingTask.duration : '30'}" min="5" max="480">
          </div>
          
          <div class="task-responsible">
            <label class="form-label">Ansvarlig</label>
            <select class="form-control task-responsible-select">`;

      // Add members as options
      if (memberName) {
        html += `<option value="${memberName}" selected>${memberName}</option>`;
      } else {
        // Try to get members from the global scope or from the team assignment
        const globalMembers = window.members || members || [];
        if (globalMembers && globalMembers.length > 0) {
          globalMembers.forEach(member => {
            const fullName = `${member.fornavn} ${member.efternavn}`.trim();
            if (fullName) {
              html += `<option value="${fullName}">${fullName}</option>`;
            }
          });
        } else {
          // If no members available, just add the current member name
          html += `<option value="${memberName || ''}">${memberName || 'Vælg ansvarlig...'}</option>`;
        }
      }

      html += `
            </select>
          </div>
          
          <div class="task-contact">
            <label class="form-label">Kontakt Nummer</label>
            <input type="tel" class="form-control task-contact-input" value="${existingTask ? existingTask.contactNumber : ''}" placeholder="Telefon nummer...">
          </div>
          
          <button type="button" class="btn btn-sm btn-danger" onclick="removeTaskFromTeam('${taskId}')" style="margin-top: 10px;">
            <i class="fas fa-trash"></i> Fjern Opgave
          </button>
        </div>
      `;

      taskList.insertAdjacentHTML('beforeend', html);
    }

    function removeTaskFromTeam(taskId) {
      const element = document.getElementById(taskId);
      if (element) {
        element.remove();
      }
      
      // Check if task container should be hidden
      const taskList = element?.parentElement;
      if (taskList && taskList.children.length === 0) {
        const taskContainer = taskList.parentElement;
        if (taskContainer) {
          taskContainer.style.display = 'none';
        }
      }
    }

    function getTeamAssignments() {
      const assignments = [];
      const assignmentElements = document.querySelectorAll('.team-assignment-item');
      
      assignmentElements.forEach(element => {
        const teamSelector = element.querySelector('.team-selector');
        const teamName = teamSelector.value;
        
        if (teamName) {
          const memberCheckboxes = element.querySelectorAll('.member-selection input[type="checkbox"]:checked');
          const members = Array.from(memberCheckboxes).map(cb => cb.value);
          
          // Get tasks for this team
          const taskElements = element.querySelectorAll('.task-assignment-item');
          const tasks = [];
          taskElements.forEach(taskElement => {
            const description = taskElement.querySelector('.task-description').value.trim();
            const timing = taskElement.querySelector('.task-timing-select').value;
            const duration = taskElement.querySelector('.task-duration-input').value;
            const responsible = taskElement.querySelector('.task-responsible-select').value;
            const contactNumber = taskElement.querySelector('.task-contact-input').value.trim();
            
            if (description && responsible) {
              tasks.push({
                description: description,
                timing: timing,
                duration: parseInt(duration) || 30,
                responsible: responsible,
                contactNumber: contactNumber
              });
            }
          });
          
          assignments.push({
            teamName: teamName,
            members: members,
            tasks: tasks
          });
        }
      });
      
      return assignments;
    }

      const container = document.getElementById('templates-list');
      
      if (eventTemplates.length === 0) {
        container.innerHTML = '<p>Ingen skabeloner fundet</p>';
        return;
      }
      
      let html = '<h4>Eksisterende Skabeloner</h4>';
      
      eventTemplates.forEach(template => {
        html += `
          <div style="border: 1px solid #e0e0e0; border-radius: 6px; padding: 15px; margin-bottom: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>${template.name}</strong>
                ${template.description ? `<br><small style="color: var(--secondary);">${template.description}</small>` : ''}
              </div>
              <button class="btn btn-sm btn-danger" onclick="deleteTemplate('${template.id}')">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }

    function deleteTemplate(templateId) {
      if (!confirm('Er du sikker på at du vil slette denne skabelon?')) {
        return;
      }
      
      callApi('deleteEventTemplate', { templateId: templateId }, function(result) {
        if (result.success) {
          showToast('Skabelon slettet!', 'success');
          loadEventTemplates();
        } else {
          showToast(result.message || 'Fejl ved sletning af skabelon', 'error');
        }
      }, function(error) {
        showToast('Fejl: ' + error, 'error');
      });
    }

    // Filter events
    function filterEvents(filter) {
      // Filter calendar events
      const eventBlocks = document.querySelectorAll('.event-block');
      eventBlocks.forEach(block => {
        const text = block.textContent.toLowerCase();
        block.style.display = text.includes(filter) ? 'block' : 'none';
      });
      
      // Filter list events
      const eventCards = document.querySelectorAll('.event-card');
      eventCards.forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(filter) ? 'block' : 'none';
      });
    }

    // Utility functions
    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function formatDisplayDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('da-DK', { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      });
    }

    // Toast notification system
    function showToast(message, type = 'success') {
      // Remove existing toasts
      const existingToasts = document.querySelectorAll('.toast');
      existingToasts.forEach(toast => toast.remove());
      
      // Create new toast
      const toast = document.createElement('div');
      toast.className = 'toast';
      
      const bgColor = type === 'success' ? '#28a745' : 
                      type === 'error' ? '#dc3545' : 
                      type === 'warning' ? '#ffc107' : 
                      type === 'info' ? '#17a2b8' : '#6c757d';
      
      toast.style.backgroundColor = bgColor;
      toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : type === 'error' ? 'exclamation-triangle' : type === 'warning' ? 'exclamation-triangle' : 'info-circle'}"></i> ${message}`;
      
      document.body.appendChild(toast);
      
      // Auto remove after 4 seconds
      setTimeout(() => {
        if (toast && toast.parentNode) {
          toast.remove();
        }
      }, 4000);
    }























  </script>
  
  <!-- XLSX Library for Excel export/import -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <script>
    // Download Excel template for events
    function downloadEventsTemplate() {
      callApi('generateEventsTemplate', {}, function(result) {
        if (result && result.success) {
          const headers = result.headers;
          const exampleRow = result.exampleRow;
          const personsList = result.personsList || [];
          
          const wb = XLSX.utils.book_new();
          const wsData = [headers, exampleRow];
          const ws = XLSX.utils.aoa_to_sheet(wsData);
          ws['!cols'] = headers.map(() => ({ wch: 20 }));
          
          // Add persons list as a separate sheet for dropdown validation
          if (personsList.length > 0) {
            const personsSheetData = [['Navn'], ...personsList.map(p => [p])];
            const personsWs = XLSX.utils.aoa_to_sheet(personsSheetData);
            personsWs['!cols'] = [{ wch: 30 }];
            XLSX.utils.book_append_sheet(wb, personsWs, 'Medlemmer_Kontakter');
            
            // Try to add data validation to Team column (column index 5)
            try {
              const personsRange = `Medlemmer_Kontakter!$A$2:$A$${personsList.length + 1}`;
              const teamColIdx = 5; // Team column
              const colLetter = XLSX.utils.encode_col(teamColIdx);
              
              if (!ws['!dataValidation']) {
                ws['!dataValidation'] = [];
              }
              
              // Add validation to Team column (rows 2-100)
              for (let row = 2; row <= 100; row++) {
                const cellRef = colLetter + row;
                ws['!dataValidation'].push({
                  sqref: cellRef,
                  type: 'list',
                  formula1: personsRange
                });
              }
            } catch (e) {
              console.log('Data validation not supported, will use helper sheet only:', e);
            }
            
            // Add instructions sheet
            const instructions = [
              ['INSTRUKTIONER TIL DROPDOWN VALIDERING'],
              [''],
              ['For at tilføje dropdown validering til "Team" kolonnen:'],
              ['1. Vælg kolonne F (Team) fra række 2 og nedad'],
              ['2. Gå til Data > Data Validation'],
              ['3. Vælg "List" som tilladelse'],
              ['4. I "Source" feltet, indtast: =Medlemmer_Kontakter!$A$2:$A$' + (personsList.length + 1)],
              ['5. Klik OK'],
              [''],
              ['Nu kan du vælge personer fra dropdown menuen i stedet for at skrive dem manuelt.'],
              ['Dette sikrer at du vælger korrekte navne fra medlemmer og kontakter.']
            ];
            const instructionsWs = XLSX.utils.aoa_to_sheet(instructions);
            instructionsWs['!cols'] = [{ wch: 80 }];
            XLSX.utils.book_append_sheet(wb, instructionsWs, 'Instruktioner');
          }
          
          XLSX.utils.book_append_sheet(wb, ws, 'Events');
          XLSX.writeFile(wb, 'Events_Skabelon.xlsx');
          showToast('Skabelon downloadet med medlemmer/kontakter liste', 'success');
        } else {
          showToast('Fejl ved download af skabelon: ' + (result.message || 'Ukendt fejl'), 'error');
        }
      }, function(error) {
        showToast('Fejl ved download af skabelon: ' + error, 'error');
      });
    }
  </script>
